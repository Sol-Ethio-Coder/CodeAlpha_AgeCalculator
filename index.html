<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sol Age Calculator</title>

    <!-- This creates a beautiful emoji-based favicon that works across all browsers -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e2a5e' rx='20'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white'%3E📅%3C/text%3E%3C/svg%3E">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Premium Animated Gradient Background with Particle Effects -->
    <div class="premium-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="gradient-orb orb-4"></div>
        <div class="noise-overlay"></div>
        <div class="particle-container" id="particleContainer"></div>
    </div>

    <div class="age-card">
        <div class="header">
            <div class="header-glow"></div>
            <h1>✨ Sol Ethio Coder ✨</h1>
            <p>Precision age calculation · Years, Months & Days since your first breath</p>
        </div>
        <div class="content">
            <!-- Date of birth inputs: day, month, year -->
            <div class="dob-group">
                <div class="input-field">
                    <label>📆 DAY</label>
                    <input type="number" id="dayInput" placeholder="DD" min="1" max="31" step="1" value="15">
                </div>
                <div class="input-field">
                    <label>📅 MONTH</label>
                    <input type="number" id="monthInput" placeholder="MM" min="1" max="12" step="1" value="5">
                </div>
                <div class="input-field">
                    <label>🗓️ YEAR</label>
                    <input type="number" id="yearInput" placeholder="YYYY" min="1900" max="2026" step="1" value="1995">
                </div>
            </div>

            <button class="calc-btn" id="calculateBtn">
                <span class="btn-text">✨ Calculate Age ✨</span>
                <span class="btn-glow"></span>
            </button>

            <div class="result-area" id="resultArea">
                <div class="age-digits" id="ageDigitsContainer">
                    <div class="age-stat">
                        <div class="stat-icon">🎂</div>
                        <div class="stat-number" id="yearsValue">--</div>
                        <div class="stat-label">Years</div>
                    </div>
                    <div class="age-stat">
                        <div class="stat-icon">📆</div>
                        <div class="stat-number" id="monthsValue">--</div>
                        <div class="stat-label">Months</div>
                    </div>
                    <div class="age-stat">
                        <div class="stat-icon">⏰</div>
                        <div class="stat-number" id="daysValue">--</div>
                        <div class="stat-label">Days</div>
                    </div>
                </div>
                <div class="extra-message" id="extraMessage">
                    ✨ Enter your birth date and click calculate ✨
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </div>
        </div>
        
        <!-- Developer Footer with Portfolio Link and Social Links -->
        <footer>
            <div class="footer-content">
                <div class="credit-text">
                    <span class="heart">💜</span> Crafted with passion by 
                    <a href="#" id="portfolioLink" class="portfolio-link" target="_blank">
                        Sol Ethio Coder <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
                <div class="footer-details">
                    <span>⚡ Leap year aware</span>
                    <span class="separator">•</span>
                    <span>📅 Precise month/day calculation</span>
                    <span class="separator">•</span>
                    <span>✨ Time capsule magic</span>
                </div>
                <div class="social-links">
                    <a href="https://github.com/Sol-Ethio-Coder" target="_blank" aria-label="GitHub" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/Sol-Ethio-Coder" target="_blank" aria-label="LinkedIn" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://t.me/Sol_Ethio_Coder" target="_blank" aria-label="Telegram" class="social-link"><i class="fab fa-telegram-plane"></i></a>
                </div>
            </div>
        </footer>
    </div>
    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
